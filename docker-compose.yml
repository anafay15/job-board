version : "3"

services:
    postgres:
      image: postgres:15
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: password
        POSTGRES_DB: job_board
      volumes:
        - pg-data:/var/lib/postgresql/data
    
    backend:
      build: .
      environment:
        DB_HOST: postgres
        DB_USER: postgres
        DB_PASSWORD: password
        DB_NAME: job_board
        JWT_SECRET: supersecretkey123
      ports:
        - "3000:3000"
      depends_on:
        - postgres

    nginx:
     image: nginx:alpine
     ports:
      - "80:80"
     volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
     depends_on:
      - backend   

volumes:
  pg-data: