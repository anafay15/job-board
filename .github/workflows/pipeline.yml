on:
  push:
    branches:
      - main

jobs:

  test:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start containers
        run: docker compose up -d --build

      - name: Wait and test
        run: |
          for i in $(seq 1 15); do
            curl -s http://localhost/health && echo "App is up" && exit 0
            echo "Attempt $i failed, retrying..."
            sleep 5
          done
          echo "App failed to start" && exit 1

      - name: Shut down
        run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/job-board:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/job-board:latest

      - name: Deploy to GCP server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd job-board
            git pull
            docker compose up -d --build
